# /etc/nginx/sites-available/fluxodecaixa
#
# INSTRUÇÕES:
#   1. Substitua SEU_DOMINIO.com.br pelo seu domínio real
#   2. Copie: sudo cp deploy/nginx.conf /etc/nginx/sites-available/fluxodecaixa
#   3. Ative: sudo ln -s /etc/nginx/sites-available/fluxodecaixa /etc/nginx/sites-enabled/
#   4. Teste: sudo nginx -t
#   5. HTTPS: sudo certbot --nginx -d SEU_DOMINIO.com.br
#   6. Reload: sudo systemctl reload nginx

server {
    listen 80;
    server_name SEU_DOMINIO.com.br;

    # Redirecionar todo HTTP para HTTPS (o Certbot adiciona isso automaticamente)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SEU_DOMINIO.com.br;

    # Certificados SSL (gerados pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Frontend (arquivos estáticos do Vite build) ─────────────────────────────
    root /var/www/fluxodecaixa/frontend/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/fluxodecaixa.access.log;
    error_log  /var/log/nginx/fluxodecaixa.error.log warn;

    # Compressão gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;

    # ── Cache para assets com hash no nome (Vite gera hashes) ──────────────────
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API — proxy reverso para o backend Node.js ──────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Upload de notas fiscais (max 10MB)
        client_max_body_size 10M;
    }

    # ── SPA routing — todas as rotas vão para index.html ───────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Bloquear acesso direto a arquivos sensíveis ─────────────────────────────
    location ~* \.(db|db-wal|db-shm|sqlite|env|log|sh)$ {
        deny all;
        return 404;
    }

    # Bloquear acesso ao diretório de uploads e backup diretamente
    location ~ ^/(uploads|backups)/ {
        deny all;
        return 404;
    }

    # Bloquear arquivos ocultos
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Segurança extra: remover headers que expõem tecnologia ─────────────────
    server_tokens off;
    add_header X-Content-Type-Options   "nosniff"        always;
    add_header X-Frame-Options          "DENY"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
}
